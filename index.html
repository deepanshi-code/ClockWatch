<!DOCTYPE html>
<html>
<head>
  <title>Study Clock Pro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 🌗 Theme -->
<button id="modeToggle" class="mode-btn">⏱️</button>
<button id="themeToggle" class="theme-btn">🌙</button>

<!-- ⏱️ Mode -->


<div class="container">
  <h1 id="mainTitle">📚 STUDY CLOCK</h1>

  <!-- Time Info -->
  <div class="real-time">🕒 <span id="currentTime">--:--:--</span></div>
  <div class="end-time">⏳ Ends at: <span id="endTime">--:--:--</span></div>

  <!-- Inputs (Timer only) -->
  <div class="inputs">
    <input type="number" id="daysInput" placeholder="Days" min="0">
    <input type="number" id="hoursInput" placeholder="Hours" min="0">
    <input type="number" id="minutesInput" placeholder="Minutes" min="0">
    <input type="number" id="secondsInput" placeholder="Seconds" min="0">
  </div>

  <button id="setBtn" onclick="setTime()">Set Time</button>

  <!-- TIMER -->
  <div class="circle">
    <svg width="220" height="220">
      <circle cx="110" cy="110" r="90" class="bg"/>
      <circle cx="110" cy="110" r="90" id="progress"/>
    </svg>
    <div id="timeText">0d 0h 0m 0s</div>
  </div>

  <!-- STOPWATCH -->
  <div id="stopwatch" class="hidden">
    <h2 id="stopwatchDisplay">00:00:00</h2>
    <div class="buttons">
      <button onclick="startStopwatch()">Start</button>
      <button onclick="pauseStopwatch()">Pause</button>
      <button onclick="resetStopwatch()">Reset</button>
    </div>
  </div>

  <!-- TIMER CONTROLS -->
  <div class="buttons" id="timerControls">
    <button onclick="startTimer()">Start</button>
    <button onclick="pauseTimer()">Pause</button>
    <button onclick="resetTimer()">Reset</button>
  </div>
</div>

<script>
let time = 0, totalTime = 1, timer = null, running = false;
let swTime = 0, swTimer = null, swRunning = false;
let isStopwatch = false;

/* ================= MODE SWITCH ================= */
document.getElementById("modeToggle").onclick = () => {
  isStopwatch = !isStopwatch;

  document.getElementById("stopwatch").classList.toggle("hidden");
  document.querySelector(".circle").classList.toggle("hidden");

  document.getElementById("timerControls").classList.toggle("hidden");
  document.querySelector(".inputs").classList.toggle("hidden");
  document.getElementById("setBtn").classList.toggle("hidden");

  document.querySelector(".end-time").classList.toggle("hidden");

  // 🔥 CHANGE HEADING
  document.getElementById("mainTitle").innerText =
    isStopwatch ? "⏱️ STOPWATCH" : "📚 STUDY CLOCK";

  document.getElementById("modeToggle").innerText =
    isStopwatch ? "⏳" : "⏱️";
};
/* ================= STOPWATCH ================= */
function updateStopwatch() {
  let h = Math.floor(swTime / 3600);
  let m = Math.floor((swTime % 3600) / 60);
  let s = swTime % 60;

  document.getElementById("stopwatchDisplay").innerText =
    `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function startStopwatch() {
  if (swRunning) return;
  swRunning = true;
  swTimer = setInterval(() => { swTime++; updateStopwatch(); }, 1000);
}

function pauseStopwatch() {
  clearInterval(swTimer);
  swRunning = false;
}

function resetStopwatch() {
  clearInterval(swTimer);
  swRunning = false;
  swTime = 0;
  updateStopwatch();
}

/* ================= REAL TIME ================= */
function updateRealTime() {
  let now = new Date();
  currentTime.innerText =
    `${String(now.getHours()).padStart(2,'0')}:` +
    `${String(now.getMinutes()).padStart(2,'0')}:` +
    `${String(now.getSeconds()).padStart(2,'0')}`;
}
setInterval(updateRealTime, 1000);
updateRealTime();

/* ================= SET TIME ================= */
function setTime() {
  let d = +daysInput.value || 0;
  let h = +hoursInput.value || 0;
  let m = +minutesInput.value || 0;
  let s = +secondsInput.value || 0;

  let total = d*86400 + h*3600 + m*60 + s;
  if (total <= 0) return alert("Enter valid time!");

  time = total;
  totalTime = total;
  updateDisplay();
}

/* ================= DISPLAY ================= */
function updateDisplay() {
  let d = Math.floor(time / 86400);
  let h = Math.floor((time % 86400) / 3600);
  let m = Math.floor((time % 3600) / 60);
  let s = time % 60;

  timeText.innerText = `${d}d ${h}h ${m}m ${s}s`;

  let c = 2 * Math.PI * 90;
  progress.style.strokeDashoffset = c - (time / totalTime) * c;
}

/* ================= TIMER ================= */
function startTimer() {
  if (running || time <= 0) return;
  running = true;

  let end = new Date(Date.now() + time * 1000);
  endTime.innerText =
    `${String(end.getHours()).padStart(2,'0')}:` +
    `${String(end.getMinutes()).padStart(2,'0')}:` +
    `${String(end.getSeconds()).padStart(2,'0')}`;

  timer = setInterval(() => {
    if (time > 0) {
      time--;
      updateDisplay();
    } else {
      clearInterval(timer);
      running = false;

      alert("⏰ Time's up!");

      if (Notification.permission === "granted") {
        new Notification("⏰ Time's up!", { body: "Great job 🚀" });
      }

      new Audio("https://www.soundjay.com/buttons/sounds/beep-07.mp3").play();
    }
  }, 1000);
}

function pauseTimer() {
  clearInterval(timer);
  running = false;
}

function resetTimer() {
  clearInterval(timer);
  running = false;
  time = 0;
  totalTime = 1;

  timeText.innerText = "0d 0h 0m 0s";
  endTime.innerText = "--:--:--";

  let c = 2 * Math.PI * 90;
  progress.style.strokeDashoffset = c;
}

/* ================= THEME ================= */
themeToggle.onclick = () => {
  document.body.classList.toggle("light");
  themeToggle.innerText =
    document.body.classList.contains("light") ? "☀️" : "🌙";
};

/* ================= NOTIFICATION ================= */
if ("Notification" in window) {
  Notification.requestPermission();
}

/* ================= INIT ================= */
window.onload = () => {
  let c = 2 * Math.PI * 90;
  progress.style.strokeDasharray = c;
  progress.style.strokeDashoffset = c;
};
</script>

</body>
</html>
